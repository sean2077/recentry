name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked
      - name: Install NSIS
        run: choco install nsis --version=3.12.0 --yes --no-progress
      - name: Package Windows x64
        shell: pwsh
        run: tools/package-windows.ps1
      - name: Package smoke test
        shell: pwsh
        run: tools/test-windows-package.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: recentry-windows-x64
          path: dist/*
          if-no-files-found: error

  native-workspace:
    name: Native workspace (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-24.04
          - label: Linux ARM64
            os: ubuntu-24.04-arm
          - label: macOS Apple Silicon
            os: macos-15
          - label: macOS Intel
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked
